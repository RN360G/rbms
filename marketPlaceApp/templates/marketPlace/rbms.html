    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const toggle = document.getElementById('searchToggle');
            const container = document.getElementById('navSearchContainer');
            const form = document.getElementById('searchForm');
            if (!toggle || !container || !form) return;

            const showForm = () => {
                container.classList.remove('d-none');
                container.setAttribute('aria-hidden','false');
                toggle.classList.add('d-none');
            };
            const hideForm = () => {
                container.classList.add('d-none');
                container.setAttribute('aria-hidden','true');
                toggle.classList.remove('d-none');
            };

            toggle.addEventListener('click', (e) => {
                e.preventDefault();
                showForm();
            });

            // hide when mouse leaves the container or focus leaves the form
            container.addEventListener('mouseleave', hideForm);
            form.addEventListener('focusout', (e) => {
                if (!form.contains(e.relatedTarget)) hideForm();
            });

            // optional: Esc key to close
            document.addEventListener('keydown', (e) => { if (e.key === 'Escape') hideForm(); });
        });
    </script>

    <script>
        (function () {
            const btn = document.getElementById('scrollTopBtn');
            if (!btn) return;
            const showAt = 200; // px scrolled before showing

            const toggle = () => {
                if (window.scrollY > showAt) btn.classList.add('show');
                else btn.classList.remove('show');
            };

            // show/hide on scroll
            window.addEventListener('scroll', toggle, { passive: true });
            // initial state
            toggle();

            // smooth scroll to top on click
            btn.addEventListener('click', function (e) {
                e.preventDefault();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });

            // keyboard accessibility: Enter/Space
            btn.addEventListener('keydown', function (e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            });
        })();
    </script>

    <script>

    <!--use install button-->
    <script>
        let deferredPrompt;
        // Detect install prompt availability
        window.addEventListener("beforeinstallprompt", e => {
            e.preventDefault();
            deferredPrompt = e;
            const installBtn = document.getElementById("installBtn");
            installBtn.style.display = "block";

            installBtn.addEventListener("click", () => {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(choice => {
                if (choice.outcome === "accepted") {
                    console.log("User installed the app");
                }
                deferredPrompt = null;
                });
            });
        });

        // Detect when app is installed
        window.addEventListener("appinstalled", () => {
        console.log("App successfully installed");
        const installBtn = document.getElementById("installBtn");
        installBtn.style.display = "none"; // hide the button
        });
    </script>
