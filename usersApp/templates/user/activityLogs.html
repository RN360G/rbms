{% extends "dashboardApp/index.html" %}


{% block index %}
<div>
    <ul class="nav nav-tabs" role="tablist">
        <a href="{% url 'dashboard' %}" class="btn btn-outline-dark fa fa-backwad-arrow">Back</a>
    </ul>
    <br/>
    <div class="tab-content">
        <div class="container-fluid bg-gradient-light py-5 shadow">
            <h2><span class="fa fa-list"></span> Your Activity Logs</h2>
            <table width="100%" class="table table-striped table-bordered table-hover" id="dataTables-example">
                <thead>
                    <tr>
                        <th>Count</th>
                        <th>Activity</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody>
                    {% for dat in activities %}
                        <tr class="even gradeA">
                            <td>{{ forloop.counter }}</td>
                            <td><b>{{ dat.logTitle}}</b> <br/><p>{{ dat.logDetails}}</p></td>
                            <td>{{ dat.date }}</td>
                        </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

</div>
{% endblock index %}
