{% extends "dashboardApp/index.html" %}

{% block index %}
<div>
    <ul class="nav nav-tabs" role="tablist">
        <a href="{% url 'profile' %}" class="btn btn-outline-dark fa fa-backwad-arrow">Back</a>
    </ul>
    <br/>
    <div class="tab-content">
        <div class="container bg-gradient-light py-5 shadow">
            <h2><span class="fa fa-list"></span> Upload Profile Picture</h2> 
            <div class="row">
                <div class="col-md-6">
                    <h3><u>Preview Image</u></h3>
                </div>
                <div class="col-md-6">
                    <h3><u>Select Picture</u></h3>
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        <input type="file" class="form-control" name="upload" required/>
                        <button type="submit">Upload</button>
                    </form>
                </div>
            </div>   
        </div>
    </div>
</div>
{% endblock index %}
