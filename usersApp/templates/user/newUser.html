{% extends 'dashboardApp/dashboard.html' %}

{% block dashboard %}
    			<div class="row-fluid sortable">
				<div class="box span12">
					<div class="box-header" data-original-title>
                        <h2><i class="icon-user "></i><span class="break"></span>New User</h2>
						<div class="box-icon">
							<!--<a href="#" class="btn-setting"><i class="halflings-icon white wrench"></i></a>-->
							<a href="#" class="btn-minimize"><i class="halflings-icon white chevron-up"></i></a>
							<!--<a href="#" class="btn-close"><i class="halflings-icon white remove"></i></a>-->
						</div>
					</div>
					<div class="box-content">
						<form class="form-horizontal">
						  <fieldset>
                              <div class="row-fluid">
                                  <div  class="box grey span4" onTablet="span6" onDesktop="span4">
                                      <label class="control-label" for="firsName">Your First Name </label>
                                      <div class="controls">
                                          <input type="text" class="span6 firsName" id="firsName" style="width: 100%" placeholder="First Name" data-provide="firsName" data-items="4" data-source='["", ""]'>
                                      </div>
                                  </div>

                                  <div  class="box grey span4" onTablet="span6" onDesktop="span4">
                                      <label class="control-label" for="surname">You Surname </label>
                                      <div class="controls">
                                          <input type="text" class="span6 surname" id="surname" style="width: 100%" placeholder="Surname" data-provide="surname" data-items="4" data-source='["", ""]'>
                                      </div>
                                  </div>
                                  <div  class="box grey span4" onTablet="span6" onDesktop="span4">
                                      <label class="control-label" for="otherName">Other Name(Optional)</label>
                                      <div class="controls">
                                          <input type="text" class="span6 otherName" id="otherName" style="width: 100%" placeholder="Other Name" data-provide="surname" data-items="4" data-source='["", ""]'>
                                      </div>
                                  </div>
                              </div>

                              <div class="row-fluid">
                                  <div  class="box grey span4" onTablet="span6" onDesktop="span4">
                                      <label class="control-label" for="date01">Date Of Birth</label>
                                      <div class="controls">
                                         <input type="text" class="input-xlarge datepicker" id="date01" style="width: 95%" value="02/16/12">
                                      </div>
                                  </div>

                                  <div  class="box grey span4" onTablet="span6" onDesktop="span4">
                                      <div class="control-group">
                                          <label class="control-label" for="gender">Select Your Gender</label>
                                          <div class="controls">
                                              <select id="gender" style="width: 99%">
                                                  <option>Male</option>
                                                  <option>Female</option>
                                              </select>
                                          </div>
                                      </div>
                                  </div>
                              </div>

                              <div class="row-fluid">
                                  <div  class="box grey span4" onTablet="span6" onDesktop="span4">
                                      <div class="control-group">
                                          <label class="control-label" for="selectError1">Your Qualifications</label>
                                          <div class="controls">
                                              <select id="selectError1" style="width: 99%; background-color: brown" multiple data-rel="chosen">
                                                  <option selected>Basic School Certificate</option>
                                                  <option>High School Certificate</option>
                                                  <option>Diploma</option>
                                                  <option>HND</option>
                                                  <option>Bachelor</option>
                                                  <option>Master</option>
                                                  <option>PhD</option>
                                                  <option>Other</option>
                                              </select>
                                          </div>
                                      </div>
                                  </div>
                                  <div  class="box grey span4" onTablet="span6" onDesktop="span4">
                                      <label class="control-label" for="tel">Your Active Phone Number (Include country code e.g 233241111111)</label>
                                      <div class="controls">
                                          <input type="text" class="span6 tel" id="tel" style="width: 100%" placeholder="Tel" data-provide="surname" data-items="4" data-source='["", ""]'>
                                      </div>
                                  </div>
                                  <div  class="box grey span4" onTablet="span6" onDesktop="span4">
                                      <label class="control-label" for="email">Your Email </label>
                                      <div class="controls">
                                          <input type="text" class="span6 email" id="email" style="width: 100%" placeholder="Email" data-provide="surname" data-items="4" data-source='["", ""]'>
                                      </div>
                                  </div>
                              </div>
							<div class="form-actions">
							  <button type="submit" class="btn btn-primary">Save changes</button>
							  <button type="reset" class="btn">Cancel</button>
							</div>
						  </fieldset>
						</form>

					</div>
				</div><!--/span-->
			</div>





            <div class="row-fluid sortable">
				<div class="box span12">
					<div class="box-header" data-original-title>
						<h2><i class="halflings-icon white user"></i><span class="break"></span>Users</h2>

							<a href="#" class="btn-setting"><i class="halflings-icon white wrench"></i></a>
							<a href="#" class="btn-minimize"><i class="halflings-icon white chevron-up"></i></a>
							<a href="#" class="btn-close"><i class="halflings-icon white remove"></i></a>
						</div>
					</div>
					<div class="box-content">

									<a class="btn btn-danger" href="#">
										<i class="halflings-icon white trash"></i>
									</a>
								</td>
							</tr>
							<tr>
								<td>Dennis Ji</td>
								<td class="center">2012/01/01</td>

								<td class="center">
									<span class="label label-success">Active</span>

									<a class="btn btn-success" href="#">
										<i class="halflings-icon white zoom-in"></i>

								</td>
							</tr>
							<tr>
								<td>Dennis Ji</td>
								<td class="center">2012/03/01</td>
								<td class="center">Member</td>
								<td class="center">
									<span class="label label-warning">Pending</span>
								</td>
								<td class="center">
									<a class="btn btn-success" href="#">
										<i class="halflings-icon white zoom-in"></i>

									<a class="btn btn-info" href="#">
										<i class="halflings-icon white edit"></i>

										<i class="halflings-icon white trash"></i>

								</td>
							</tr>
						  </tbody>
					  </table>
					</div>
				</div><!--/span-->

			</div>


{% endblock %}
