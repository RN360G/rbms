{% extends "warehouse/warehouse.html" %}

{% block warehouse %}
<div id='desktop'>
    <section>
    <div class="container-fluid bg-gradient-light py-5">
        <div class="row">
            <div class="col-md-8 col-xl-6 text-center mx-auto">
                <h3 class="fw-bold">User Manual</h3>
            </div>
        </div>
        <div class="py-5 p-lg-5">
            <div class="row row-cols-1 row-cols-md-2 mx-auto" style="max-width: 900px;">

                <div class="col mb-5">
                    <div class="card shadow-sm">
                        <div class="card-body px-4 py-5 px-md-5">
                            <div class="bs-icon-lg d-flex justify-content-center align-items-center mb-3 bs-icon" style="top: 1rem;right: 1rem;position: absolute;">
                                <b class=" fa fa-clock"></b>
                            </div>
                            <h5 class="fw-bold card-title">Operational Time</h5>
                            <h4>Opens at: <b></b></h4>
                            <h4>Close at: <b></b></h4>                                                
                        </div>
                    </div>
                </div>

                <div class="col mb-5">
                    <div class="card shadow-sm">
                        <div class="card-body px-4 py-5 px-md-5">
                            <div class="bs-icon-lg d-flex justify-content-center align-items-center mb-3 bs-icon" style="top: 1rem;right: 1rem;position: absolute;">
                                <b class=" fa fa-print"></b>
                            </div>
                            <h5 class="fw-bold card-title">Current Printer: <b>{{assignedPrinter.printerRef.printerLabel}}</b> </h5>
                            <form method='post' action="{% url 'salesSelectPrinter' %}">
                                {% csrf_token %}
                                <select class="form-select" name="printer" required>
                                    <option></option>
                                    {% for printer in printers %}
                                        <option value="{{printer.id}}">{{printer.printerLabel}}</option>                                        
                                    {% endfor %}                            
                                </select>
                                <div class="mb-3">
                                    <div class="row">
                                        <div class="col-md-6 button">
                                            <button class="btn btn-outline-primary" type="submit">Select</button>
                                        </div>
                                    </div>
                                </div>
                            </form>                                                 
                        </div>
                    </div>
                </div>

                <div class="col mb-5">
                    <div class="card shadow-sm">
                        <div class="card-body px-4 py-5 px-md-5">
                            <div class="bs-icon-lg d-flex justify-content-center align-items-center mb-3 bs-icon" style="top: 1rem;right: 1rem;position: absolute;">
                                <b class=" fa fa-print"></b>
                            </div>
                            <h5 class="fw-bold card-title">Current Printer: <b>Printer label</b> </h5>
                                                
                        </div>
                    </div>
                </div>

        </div>
    </div>
</section>
